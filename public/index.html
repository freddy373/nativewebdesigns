<!DOCTYPE html>
<html>
<head>
<meta name="color-scheme" content="light">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Request</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="loader"><div class="spinner"></div></div>
<div class="wrap">
  <div class="stepsBox">
    <h2 id="stepsTitle"></h2>
    <div class="steps-flex">
      <div class="step"><div class="circle">1</div><span id="step1"></span></div>
      <div class="step"><div class="circle">2</div><span id="step2"></span></div>
      <div class="step"><div class="circle">3</div><span id="step3" class="current"></span></div>
      <div class="step"><div class="circle">4</div><span id="step4"></span></div>
      <div class="step"><div class="circle">5</div><span id="step5"></span></div>
      <div class="step"><div class="circle">6</div><span id="step6"></span></div>
    </div>
    <hr class="steps-hr">
    <div class="progress">
      <div class="bar-top-bot"><div class="bar"><div class="fill"></div></div><div class="bar-label" id="bar1"></div></div>
      <div class="bar-top-bot"><div class="bar"><div class="fill"></div></div><div class="bar-label" id="bar2"></div></div>
      <div class="bar-top-bot"><div class="bar"><div class="fill"></div></div><div class="bar-label current" id="bar3"></div></div>
    </div>
    <section class="ticket">
      <div class="stubLeft">
        <div class="form-top">
          <div class="pin">🎟️</div>
          <div>
            <h2 id="formTitle"></h2>
            <p id="formSubtitle"></p>
          </div>
        </div>

        <form id="bookingForm" enctype="multipart/form-data">
          <label id="lastNameLabel"></label>
          <input id="lastNameInput" class="field" name="lastName" required>

          <label id="nationalIdLabel"></label>
          <input id="nationalIdInput" class="field" type="text" name="nationalId" pattern="[0-9]{14}" maxlength="14" required>

          <div class="filehead">
            <span id="photoLabel"></span>
            <span id="photoName"></span>
          </div>
          <div class="file">
            <input id="photo" type="file" name="photo" accept="image/png,image/jpeg" required>
          </div>

          <label id="schoolLabel" for="school"></label>
          <select id="school" name="school" class="field" required>
            <option value="" id="schoolPlaceholder" disabled selected></option>
            <option value="pch" id="schoolPch"></option>
            <option value="pcc" id="schoolPcc"></option>
            <option value="gc" id="schoolGc"></option>
          </select>

          <button id="submitBtn" class="btn" type="submit"></button>
          <p class="note" id="noteText"></p>
        </form>
      </div>
    </section>
  </div>
</div>

<div id="successPopup" class="popup" onclick="closePopup()">
  <div class="popup-box" onclick="event.stopPropagation()">
    <h2 id="successPopupTitle"></h2>
    <p id="successPopupText"></p>
    <button type="button" class="popup-btn" onclick="closePopup()">Ok</button>
  </div>
</div>

<script>
const loader = document.getElementById("loader");
let lang = localStorage.getItem("lang") || "fr";

const TEXT = {
  fr: {
    stepsTitle: "Demande d'acces a la Kermesse CSF 2026",
    step1: "Saisie de l'adresse e-mail",
    step2: "Verification de l'adresse e-mail",
    step3: "Informations de l'invite(e)",
    step4: "Confirmation de la demande",
    step5: "Passage en caisse (si necessaire)",
    step6: "Envoi de l'invitation",
    title: "Informations de l'invite(e)",
    subtitle: "Saisissez les donnees de l'invite(e).",
    bar1: "Email",
    bar2: "Verification",
    bar3: "Demande",
    lastName: "Nom complet de l'invite(e)",
    lastNamePlaceholder: "Entrez le nom complet",
    school: "College de l'eleve / professeur / personnel",
    schoolPlaceholder: "Choisir le college",
    schoolPch: "Petit College d'Heliopolis (PCH)",
    schoolPcc: "Petit College du Caire (PCC)",
    schoolGc: "Grand College (GC)",
    nationalId: "Numero national de l'invite(e)",
    nationalIdPlaceholder: "Entrez le numero national",
    photo: "Photo de l'invite(e)",
    submit: "Envoyer la demande",
    note: "L'invitation sera envoyee plus tard.",
    popupTitle: "Demande envoyee",
    popupText: "Votre demande a ete envoyee avec succes."
  },
  ar: {
    stepsTitle: "طلب دعوة الى Kermesse CSF 2026",
    step1: "ادخال عنوان البريد الالكتروني",
    step2: "التحقق من عنوان البريد الالكتروني",
    step3: "ادخال معلومات المدعو(ة)",
    step4: "تأكيد الطلب",
    step5: "السداد (اذا لزم الامر)",
    step6: "تسلم الدعوة",
    title: "بيانات المدعو(ة)",
    subtitle: "ادخل بيانات المدعو(ة) وارفق الصورة.",
    bar1: "ادخال البريد",
    bar2: "رمز التحقق",
    bar3: "بيانات المدعو(ة)",
    lastName: "اسم المدعو كاملا",
    lastNamePlaceholder: "ادخل الاسم الكامل",
    school: "المدرسة",
    schoolPlaceholder: "اختر المدرسة",
    schoolPch: "المدرسة الصغيرة بمصر الجديدة (PCH)",
    schoolPcc: "المدرسة الصغيرة بالقاهرة (PCC)",
    schoolGc: "المدرسة الكبيرة (GC)",
    nationalId: "الرقم القومي للمدعو",
    nationalIdPlaceholder: "ادخل الرقم القومي",
    photo: "صورة المدعو",
    submit: "ارسال الطلب",
    note: "سيتم ارسال الدعوة لاحقا.",
    popupTitle: "تم ارسال الطلب",
    popupText: "تم ارسال طلبك بنجاح."
  }
};

function applyLang(){
  document.body.classList.toggle("rtl", lang === "ar");
  document.documentElement.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
  document.getElementById("stepsTitle").innerText = TEXT[lang].stepsTitle;
  document.getElementById("step1").innerText = TEXT[lang].step1;
  document.getElementById("step2").innerText = TEXT[lang].step2;
  document.getElementById("step3").innerText = TEXT[lang].step3;
  document.getElementById("step4").innerText = TEXT[lang].step4;
  document.getElementById("step5").innerText = TEXT[lang].step5;
  document.getElementById("step6").innerText = TEXT[lang].step6;
  document.getElementById("bar1").innerText = TEXT[lang].bar1;
  document.getElementById("bar2").innerText = TEXT[lang].bar2;
  document.getElementById("bar3").innerText = TEXT[lang].bar3;
  document.getElementById("formTitle").innerText = TEXT[lang].title;
  document.getElementById("formSubtitle").innerText = TEXT[lang].subtitle;
  document.getElementById("lastNameLabel").innerText = TEXT[lang].lastName;
  document.getElementById("lastNameInput").placeholder = TEXT[lang].lastNamePlaceholder;
  document.getElementById("schoolLabel").innerText = TEXT[lang].school;
  document.getElementById("schoolPlaceholder").innerText = TEXT[lang].schoolPlaceholder;
  document.getElementById("schoolPch").innerText = TEXT[lang].schoolPch;
  document.getElementById("schoolPcc").innerText = TEXT[lang].schoolPcc;
  document.getElementById("schoolGc").innerText = TEXT[lang].schoolGc;
  document.getElementById("nationalIdLabel").innerText = TEXT[lang].nationalId;
  document.getElementById("nationalIdInput").placeholder = TEXT[lang].nationalIdPlaceholder;
  document.getElementById("photoLabel").innerText = TEXT[lang].photo;
  document.getElementById("submitBtn").innerText = TEXT[lang].submit;
  document.getElementById("noteText").innerText = TEXT[lang].note;
}

function showLoader(){ loader.classList.remove("hidden"); }
function hideLoader(){ loader.classList.add("hidden"); }

function showSuccessPopup(){
  hideLoader();
  document.getElementById("successPopupTitle").innerText = TEXT[lang].popupTitle;
  document.getElementById("successPopupText").innerText = TEXT[lang].popupText;
  document.getElementById("successPopup").classList.add("active");
}

function closePopup(){
  localStorage.removeItem("studentToken");
  window.location.href = "/login";
}

async function checkAuth() {
  const token = localStorage.getItem("studentToken");
  if (!token) return window.location = "/login";
  try {
    const res = await fetch("/api/me", {
      method: "GET",
      headers: { Authorization: "Bearer " + token }
    });
    const data = await res.json();
    if (!data.ok) {
      localStorage.removeItem("studentToken");
      window.location = "/login";
    }
  } catch {
    localStorage.removeItem("studentToken");
    window.location = "/login";
  }
}

checkAuth();
window.addEventListener("load", () => { hideLoader(); applyLang(); });

const form = document.getElementById("bookingForm");
const submitBtn = document.getElementById("submitBtn");
const photo = document.getElementById("photo");
const photoName = document.getElementById("photoName");

photo.addEventListener("change", () => {
  photoName.textContent = photo.files && photo.files[0] ? photo.files[0].name : "";
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  showLoader();
  const fd = new FormData(form);
  fd.append("lang", lang);
  submitBtn.disabled = true;
  submitBtn.textContent = lang === "fr" ? "Envoi..." : "جار الارسال...";
  try {
    const res = await fetch("/api/book", {
      method: "POST",
      headers: { Authorization: "Bearer " + localStorage.getItem("studentToken") },
      body: fd
    });
    const data = await res.json();
    if (data.ok) {
      showSuccessPopup();
      form.reset();
      photoName.textContent = "";
    } else {
      hideLoader();
      alert(data.error || "Server error");
    }
  } catch {
    hideLoader();
    alert("Request failed");
  }
  submitBtn.disabled = false;
  submitBtn.textContent = TEXT[lang].submit;
});
</script>
</body>
</html>
