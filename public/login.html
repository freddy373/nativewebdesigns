<!DOCTYPE html>
<html>
<head>
<meta name="color-scheme" content="light">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Eleve</title>
<link rel="stylesheet" href="style.css">
</head>
<body id="Body">
<div id="loader"><div class="spinner"></div></div>

<div class="wrap">
  <div class="stepsBox">
    <h2 id="stepsTitle"></h2>

    <div class="steps-flex">
      <div class="step"><div class="circle">1</div><span id="step1" class="current"></span></div>
      <div class="step"><div class="circle">2</div><span id="step2"></span></div>
      <div class="step"><div class="circle">3</div><span id="step3"></span></div>
      <div class="step"><div class="circle">4</div><span id="step4"></span></div>
      <div class="step"><div class="circle">5</div><span id="step5"></span></div>
      <div class="step"><div class="circle">6</div><span id="step6"></span></div>
    </div>

    <hr class="steps-hr">

    <div class="progress">
      <div class="bar-top-bot"><div class="bar"><div class="fill"></div></div><div class="bar-label current" id="bar1"></div></div>
      <div class="bar-top-bot"><div class="bar"><div class="grey"></div></div><div class="bar-label" id="bar2"></div></div>
      <div class="bar-top-bot"><div class="bar"><div class="grey"></div></div><div class="bar-label" id="bar3"></div></div>
    </div>

    <div class="langBox">
      <label for="langSelect">Langue / اللغة</label>
      <select id="langSelect" onchange="changeLang(this.value)">
        <option value="fr">Francais</option>
        <option value="ar">العربية</option>
      </select>
    </div>

    <section class="ticket">
      <div class="stubLeft">
        <div class="form-top">
          <div class="pin">📧</div>
          <div>
            <h2 id="loginTitle"></h2>
            <p id="loginSubtitle"></p>
          </div>
        </div>
        <input id="emailInput" class="field" type="email">
        <button id="sendBtn" class="btn" type="button" onclick="sendCode()"></button>
      </div>
    </section>
  </div>
</div>

<div id="successPopup" class="popup" onclick="closePopup()">
  <div class="popup-box" onclick="event.stopPropagation()">
    <h2 id="successPopupTitle"></h2>
    <p id="successPopupText"></p>
    <button type="button" id="popupOkBtn" class="popup-btn" onclick="closePopup()">Ok</button>
  </div>
</div>

<script>
const loader = document.getElementById("loader");
let loaderTimeout;
let lang = localStorage.getItem("lang") || "fr";
document.getElementById("langSelect").value = lang;

const TEXT = {
  fr: {
    steps: "Demande d'acces a la Kermesse CSF 2026",
    step1: "Saisie de l'adresse e-mail",
    step2: "Verification de l'adresse e-mail",
    step3: "Informations de l'invite(e)",
    step4: "Confirmation de la demande",
    step5: "Passage en caisse (si necessaire)",
    step6: "Envoi de l'invitation",
    bar1: "Email",
    bar2: "Verification",
    bar3: "Demande",
    title: "Adresse e-mail de l'eleve / parents / professeur / personnel",
    subtitle: "Utilisez votre email Jesuitescsf.com",
    placeholder: "name@jesuitescsf.com",
    button: "Envoyer le code",
    alert: "Utilisez votre email @jesuitescsf.com",
    error: "L'e-mail saisi n'est pas autorise.",
    genericError: "Une erreur s'est produite. Veuillez reessayer."
  },
  ar: {
    steps: "طلب دعوة الى Kermesse CSF 2026",
    step1: "ادخال عنوان البريد الالكتروني",
    step2: "التحقق من عنوان البريد الالكتروني",
    step3: "ادخال معلومات المدعو(ة)",
    step4: "تأكيد الطلب",
    step5: "السداد (اذا لزم الامر)",
    step6: "تسلم الدعوة",
    bar1: "ادخال البريد",
    bar2: "رمز التحقق",
    bar3: "بيانات المدعو(ة)",
    title: "البريد الالكتروني للتلميذ / لولي الامر / للمدرس / للموظف",
    subtitle: "استخدم بريدك الالكتروني jesuitescsf.com",
    placeholder: "name@jesuitescsf.com",
    button: "ارسال الرمز",
    alert: "استخدم بريد @jesuitescsf.com",
    error: "البريد الالكتروني الذي ادخلته غير مصرح به.",
    genericError: "حدث خطا. يرجى المحاولة مرة اخرى."
  }
};

function showLoader() {
  loader.classList.remove("hidden");
  clearTimeout(loaderTimeout);
  loaderTimeout = setTimeout(hideLoader, 10000);
}

function hideLoader() {
  loader.classList.add("hidden");
  clearTimeout(loaderTimeout);
}

window.addEventListener("load", hideLoader);

function applyLang(){
  document.body.classList.toggle("rtl", lang === "ar");
  document.documentElement.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");

  document.getElementById("stepsTitle").innerText = TEXT[lang].steps;
  document.getElementById("step1").innerText = TEXT[lang].step1;
  document.getElementById("step2").innerText = TEXT[lang].step2;
  document.getElementById("step3").innerText = TEXT[lang].step3;
  document.getElementById("step4").innerText = TEXT[lang].step4;
  document.getElementById("step5").innerText = TEXT[lang].step5;
  document.getElementById("step6").innerText = TEXT[lang].step6;
  document.getElementById("bar1").innerText = TEXT[lang].bar1;
  document.getElementById("bar2").innerText = TEXT[lang].bar2;
  document.getElementById("bar3").innerText = TEXT[lang].bar3;
  document.getElementById("loginTitle").innerText = TEXT[lang].title;
  document.getElementById("loginSubtitle").innerText = TEXT[lang].subtitle;
  document.getElementById("emailInput").placeholder = TEXT[lang].placeholder;
  document.getElementById("sendBtn").innerText = TEXT[lang].button;
}

function changeLang(selected){
  lang = selected;
  localStorage.setItem("lang", selected);
  applyLang();
}

applyLang();

function showPopup(title, text) {
  document.getElementById("successPopupTitle").innerText = title;
  document.getElementById("successPopupText").innerText = text;
  document.getElementById("successPopup").classList.add("active");
  hideLoader();
}

async function sendCode(){
  showLoader();
  const email = document.getElementById("emailInput").value.trim().toLowerCase();
  if(!email.endsWith("@jesuitescsf.com")){
    showPopup("Error", TEXT[lang].alert);
    return;
  }

  try {
    const res = await fetch("/api/send-code", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({email})
    });
    const data = await res.json();
    if(!data.ok){
      showPopup("Error", data.errorCode === "UNAUTHORIZED_EMAIL" ? TEXT[lang].error : (data.error || TEXT[lang].genericError));
      return;
    }
    localStorage.setItem("loginEmail", email);
    window.location.href = "/verify-code";
  } catch (err) {
    showPopup("Error", TEXT[lang].genericError);
  }
}

function closePopup(){
  document.getElementById("successPopup").classList.remove("active");
}
</script>
</body>
</html>
